<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#1a252f"/>
    </linearGradient>
    <linearGradient id="northNeedle" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="southNeedle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ecf0f1"/>
      <stop offset="100%" stop-color="#bdc3c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#ring)" stroke-width="4" filter="url(#shadow)"/>
  <!-- Inner ring -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#34495e" stroke-width="1.5" opacity="0.5"/>
  <!-- Cardinal tick marks -->
  <line x1="60" y1="8"  x2="60" y2="18" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="102" x2="60" y2="112" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
  <line x1="8"  y1="60" x2="18" y2="60" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
  <line x1="102" y1="60" x2="112" y2="60" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
  <!-- Intercardinal tick marks -->
  <line x1="23.2" y1="23.2" x2="29.3" y2="29.3" stroke="#7f8c8d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="90.7" y1="23.2" x2="96.8" y2="29.3" stroke="#7f8c8d" stroke-width="1.5" stroke-linecap="round" transform="rotate(90 60 60)"/>
  <line x1="96.8" y1="90.7" x2="90.7" y2="96.8" stroke="#7f8c8d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23.2" y1="96.8" x2="29.3" y2="90.7" stroke="#7f8c8d" stroke-width="1.5" stroke-linecap="round"/>
  <!-- North needle (red) -->
  <polygon points="60,18 52,60 68,60" fill="url(#northNeedle)" filter="url(#shadow)"/>
  <!-- South needle (white/silver) -->
  <polygon points="60,102 52,60 68,60" fill="url(#southNeedle)" filter="url(#shadow)"/>
  <!-- East needle -->
  <polygon points="102,60 60,52 60,68" fill="url(#southNeedle)" opacity="0.7"/>
  <!-- West needle -->
  <polygon points="18,60 60,52 60,68" fill="url(#southNeedle)" opacity="0.7"/>
  <!-- Center circle -->
  <circle cx="60" cy="60" r="6" fill="#2c3e50" filter="url(#shadow)"/>
  <circle cx="60" cy="60" r="3.5" fill="#e74c3c"/>
  <!-- N letter -->
  <text x="60" y="36" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#e74c3c">N</text>
</svg>
